<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SentinelForge Digital Space Twin</title>
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.114/Build/Cesium/Cesium.js"></script>
    <link href="https://cesium.com/downloads/cesiumjs/releases/1.114/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0b0f19; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        #cesiumContainer { width: 100vw; height: 100vh; }
        .hud-overlay {
            position: absolute; top: 16px; left: 16px; z-index: 10;
            background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(12px);
            border: 1px solid rgba(100, 200, 255, 0.2); border-radius: 12px;
            padding: 16px 20px; color: #e2e8f0; min-width: 300px;
        }
        .hud-title { font-size: 20px; font-weight: 700; letter-spacing: 2px; color: #fff; }
        .hud-title span { color: #38bdf8; }
        .hud-subtitle { font-size: 11px; color: #94a3b8; margin-top: 2px; }
        .obj-list { margin-top: 12px; font-size: 13px; }
        .obj-row { display: flex; justify-content: space-between; padding: 6px 0;
                   border-bottom: 1px solid rgba(255,255,255,0.05); }
        .obj-name { color: #38bdf8; font-family: monospace; }
        .obj-alt { color: #a5f3fc; font-family: monospace; }
        .status-bar {
            position: absolute; bottom: 16px; left: 16px; z-index: 10;
            background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(12px);
            border: 1px solid rgba(100, 200, 255, 0.2); border-radius: 8px;
            padding: 8px 16px; color: #94a3b8; font-size: 12px; font-family: monospace;
        }
        .conj-panel {
            position: absolute; top: 16px; right: 16px; z-index: 10;
            background: rgba(30, 10, 10, 0.9); backdrop-filter: blur(12px);
            border: 1px solid rgba(239, 68, 68, 0.4); border-radius: 12px;
            padding: 16px 20px; color: #fca5a5; min-width: 280px; display: none;
        }
        .conj-title { font-size: 16px; font-weight: 700; color: #ef4444; }
        .pulse { animation: pulse-anim 2s infinite; }
        @keyframes pulse-anim {
            0% { box-shadow: 0 0 0 0 rgba(239,68,68,0.5); }
            70% { box-shadow: 0 0 0 12px rgba(239,68,68,0); }
        }
    </style>
</head>
<body>
    <div id="cesiumContainer"></div>

    <!-- HUD Overlay -->
    <div class="hud-overlay">
        <div class="hud-title">SENTINEL<span>FORGE</span></div>
        <div class="hud-subtitle">Digital Space Twin // Live Propagation</div>
        <div class="obj-list" id="objList">
            <div style="color: #64748b;">Connecting to WebSocket...</div>
        </div>
    </div>

    <!-- Conjunction Alert Panel -->
    <div class="conj-panel" id="conjPanel">
        <div class="conj-title pulse">⚠ CONJUNCTION EVENT</div>
        <div id="conjData" style="margin-top: 10px; font-size: 13px; font-family: monospace;"></div>
    </div>

    <!-- Status Bar -->
    <div class="status-bar" id="statusBar">WS: disconnected | Objects: 0</div>

    <script>
        // Initialize CesiumJS (use Ion default token for demo)
        Cesium.Ion.defaultAccessToken = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiI0YjRjOGY2NS1kZjg5LTRjNDEtYjM1Ni03NTAxNDE1MWQ2MjAiLCJpZCI6MjU5LCJpYXQiOjE3MDA1MjYwNTF9.demo';

        const viewer = new Cesium.Viewer('cesiumContainer', {
            imageryProvider: false,
            baseLayerPicker: false,
            geocoder: false,
            homeButton: false,
            navigationHelpButton: false,
            animation: false,
            timeline: false,
            sceneModePicker: false,
            fullscreenButton: false,
            selectionIndicator: true,
            infoBox: true,
        });

        // Dark globe styling
        viewer.scene.backgroundColor = Cesium.Color.fromCssColorString('#0b0f19');
        viewer.scene.globe.baseColor = Cesium.Color.fromCssColorString('#1a1a2e');

        // Track satellite entities
        const entities = {};

        // Color map for objects
        const colors = {
            25544: Cesium.Color.CYAN,
            48274: Cesium.Color.LIME,
            99999: Cesium.Color.YELLOW,
        };

        function updateHUD(objects) {
            const list = document.getElementById('objList');
            list.innerHTML = objects.map(o =>
                `<div class="obj-row">
                    <span class="obj-name">${o.name}</span>
                    <span class="obj-alt">${o.alt_km.toFixed(1)} km</span>
                </div>`
            ).join('');
        }

        function updateEntity(obj) {
            const id = `sat_${obj.norad_id}`;
            const pos = Cesium.Cartesian3.fromDegrees(obj.lon, obj.lat, obj.alt_km * 1000);
            const color = colors[obj.norad_id] || Cesium.Color.WHITE;

            if (!entities[id]) {
                entities[id] = viewer.entities.add({
                    id: id,
                    name: obj.name,
                    position: pos,
                    point: { pixelSize: 8, color: color, outlineColor: Cesium.Color.WHITE, outlineWidth: 1 },
                    label: {
                        text: obj.name, font: '12px monospace',
                        fillColor: color, outlineColor: Cesium.Color.BLACK,
                        outlineWidth: 2, style: Cesium.LabelStyle.FILL_AND_OUTLINE,
                        verticalOrigin: Cesium.VerticalOrigin.BOTTOM, pixelOffset: new Cesium.Cartesian2(0, -12),
                    },
                    description: `NORAD: ${obj.norad_id}<br>Alt: ${obj.alt_km} km<br>Lat: ${obj.lat}<br>Lon: ${obj.lon}`,
                });
            } else {
                entities[id].position = pos;
            }
        }

        // WebSocket connection
        function connectWS() {
            const ws = new WebSocket('ws://localhost:8001/ws/twin');
            ws.onopen = () => {
                document.getElementById('statusBar').textContent = 'WS: connected | Streaming at 1Hz';
            };
            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                if (data.type === 'catalog_update') {
                    data.objects.forEach(updateEntity);
                    updateHUD(data.objects);
                    document.getElementById('statusBar').textContent =
                        `WS: live | Objects: ${data.objects.length} | T+${data.sim_time_sec}s`;
                }
            };
            ws.onclose = () => {
                document.getElementById('statusBar').textContent = 'WS: disconnected — retrying in 3s...';
                setTimeout(connectWS, 3000);
            };
            ws.onerror = () => ws.close();
        }

        // Conjunction WebSocket
        function connectConjunction() {
            const ws = new WebSocket('ws://localhost:8001/ws/conjunction');
            const panel = document.getElementById('conjPanel');
            const data = document.getElementById('conjData');
            ws.onopen = () => { panel.style.display = 'block'; };
            ws.onmessage = (event) => {
                const d = JSON.parse(event.data);
                if (d.type === 'conjunction_frame') {
                    data.innerHTML =
                        `TCA in: ${d.tca_minus_sec}s<br>` +
                        `Miss: ${d.miss_distance_km} km<br>` +
                        `Pc (Non-Gaussian): ${d.pc_non_gaussian}`;
                } else if (d.type === 'conjunction_complete') {
                    data.innerHTML = 'EVENT COMPLETE';
                }
            };
            ws.onclose = () => { panel.style.display = 'none'; };
        }

        // Boot
        connectWS();
        setTimeout(connectConjunction, 2000);
    </script>
</body>
</html>
