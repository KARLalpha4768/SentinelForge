<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SentinelForge — Engineering Portal</title>
    <meta name="description" content="Engineering reference and Space Domain Awareness doctrine">
    <link rel="stylesheet" href="sentinel_ops.css">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:#0a0c14; color:#b0bec5; font-family:'Inter','Segoe UI',sans-serif; min-height:100vh; display:flex; flex-direction:column; overflow:hidden; }

        /* ── Top Nav ── */
        .cat-nav { display:flex; align-items:center; gap:16px; padding:10px 24px; background:linear-gradient(180deg,rgba(10,12,20,0.98),rgba(10,12,20,0.92)); border-bottom:1px solid rgba(100,160,255,0.08); z-index:100; flex-shrink:0; }
        .cat-nav .logo { font-size:16px; font-weight:800; color:#7c4dff; letter-spacing:1px; }
        .cat-nav .logo span { color:#00e5ff; font-weight:400; margin-left:6px; font-size:13px; }
        .cat-nav a { color:#78909c; font-size:11px; text-decoration:none; padding:4px 10px; border:1px solid rgba(255,255,255,0.06); border-radius:4px; transition:all .2s; }
        .cat-nav a:hover { color:#e8eaf6; border-color:rgba(124,77,255,0.3); background:rgba(124,77,255,0.08); }
        .cat-nav .spacer { flex:1; }

        /* ── Portal Layout ── */
        .portal-main { display:flex; flex:1; overflow:hidden; }
        
        /* Sidebar */
        .portal-sidebar { width:280px; background:rgba(15,18,30,0.95); border-right:1px solid rgba(255,255,255,0.05); display:flex; flex-direction:column; overflow-y:auto; flex-shrink:0; }
        .sidebar-header { padding:20px; font-size:10px; font-weight:700; color:#546e7a; text-transform:uppercase; letter-spacing:1px; border-bottom:1px solid rgba(255,255,255,0.03); }
        .nav-item { padding:12px 20px; cursor:pointer; color:#78909c; font-size:13px; font-weight:500; border-left:3px solid transparent; transition:all .2s; display:flex; align-items:center; gap:10px; }
        .nav-item:hover { background:rgba(124,77,255,0.05); color:#b0bec5; }
        .nav-item.active { background:rgba(124,77,255,0.1); border-left-color:#7c4dff; color:#e8eaf6; font-weight:600; }
        .nav-icon { font-size:16px; opacity:0.7; }
        .nav-item.active .nav-icon { opacity:1; color:#00e5ff; }

        /* Content Area */
        .portal-content { flex:1; overflow-y:auto; padding:40px; background:#0a0c14; scroll-behavior:smooth; }
        .page-container { max-width:800px; margin:0 auto; display:none; animation:fadeIn 0.3s ease; }
        .page-container.active { display:block; }
        
        @keyframes fadeIn {
            from { opacity:0; transform:translateY(10px); }
            to { opacity:1; transform:translateY(0); }
        }

        /* Typography & Components */
        .chapter-title { font-size:32px; font-weight:800; color:#e8eaf6; margin-bottom:12px; letter-spacing:-0.5px; }
        .chapter-subtitle { font-size:16px; color:#00e5ff; margin-bottom:40px; font-weight:400; }
        
        h2 { font-size:20px; color:#e8eaf6; margin:36px 0 16px; border-bottom:1px solid rgba(100,160,255,0.1); padding-bottom:8px; }
        h3 { font-size:16px; color:#b0bec5; margin:24px 0 12px; }
        p { font-size:15px; line-height:1.7; margin-bottom:16px; color:#90a4ae; }
        
        ul, ol { margin:0 0 16px 24px; color:#90a4ae; font-size:15px; line-height:1.7; }
        li { margin-bottom:8px; }
        strong { color:#e8eaf6; font-weight:600; }

        .callout { padding:16px 20px; border-radius:8px; margin:24px 0; font-size:14px; line-height:1.6; border-left:4px solid; }
        .callout.info { background:rgba(0,229,255,0.05); border-color:#00e5ff; color:#b0bec5; }
        .callout.warning { background:rgba(255,171,0,0.05); border-color:#ffab00; color:#b0bec5; }
        
        .code-block { background:#0f121e; border:1px solid rgba(255,255,255,0.05); padding:16px; border-radius:8px; font-family:'JetBrains Mono',monospace; font-size:13px; color:#00e676; margin:20px 0; overflow-x:auto; }

        /* Diagrams */
        .diagram-box { background:rgba(255,255,255,0.02); border:1px solid rgba(255,255,255,0.05); border-radius:8px; padding:24px; margin:24px 0; text-align:center; }
        .diagram-caption { font-size:12px; color:#546e7a; margin-top:12px; font-style:italic; }

        /* Scrollbar */
        ::-webkit-scrollbar { width:6px; }
        ::-webkit-scrollbar-thumb { background:rgba(124,77,255,0.2); border-radius:3px; }
    </style>
</head>
<body>

    <!-- Nav -->
    <nav class="cat-nav">
        <div class="logo">SENTINELFORGE<span>Engineering Portal</span></div>
        <div class="spacer"></div>
        <a href="sentinel_ops.html">← Ops Center</a>
        <a href="sentinel_catalog.html">📊 Catalog</a>
    </nav>

    <!-- Main -->
    <div class="portal-main">
        <!-- Sidebar -->
        <div class="portal-sidebar" id="portalNav">
            <div class="sidebar-header">Table of Contents</div>
            <div class="nav-item active" data-target="ch1"><span class="nav-icon">🌍</span> 1. SDA Doctrine</div>
            <div class="nav-item" data-target="ch2"><span class="nav-icon">🪐</span> 2. Orbital Mechanics</div>
            <div class="nav-item" data-target="ch3"><span class="nav-icon">📡</span> 3. Sensor Networks</div>
            <div class="nav-item" data-target="ch4"><span class="nav-icon">⚠️</span> 4. Conjunction Assessment</div>
            <div class="nav-item" data-target="ch5"><span class="nav-icon">🗄️</span> 5. Catalog Maintenance</div>
            <div class="nav-item" data-target="ch6"><span class="nav-icon">💥</span> 6. Debris Environment</div>
            <div class="nav-item" data-target="ch7"><span class="nav-icon">🚀</span> 7. Launch & Reentry</div>
            <div class="nav-item" data-target="ch8"><span class="nav-icon">⚙️</span> 8. System Architecture</div>
        </div>

        <!-- Content -->
        <div class="portal-content" id="portalContent">
            <!-- Dynamic content goes here -->
        </div>
    </div>

    <script src="sentinel_portal.js"></script>
</body>
</html>
