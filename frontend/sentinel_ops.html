<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SentinelForge — Operations Center</title>
    <meta name="description" content="Enterprise Space Domain Awareness Operations Dashboard">
    <link rel="stylesheet" href="sentinel_ops.css">
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.113/Build/Cesium/Cesium.js"></script>
    <link rel="stylesheet" href="https://cesium.com/downloads/cesiumjs/releases/1.113/Build/Cesium/Widgets/widgets.css">
</head>
<body>
<div class="ops-grid">

    <!-- ① COMMAND BAR -->
    <header class="command-bar">
        <span class="cmd-logo">SentinelForge</span>
        <div class="cmd-health" id="sysHealth" title="System Health"></div>
        <div class="cmd-divider"></div>
        <div class="cmd-metric"><span class="cmd-metric-label">Catalog</span><span class="cmd-metric-value" id="catalogCount">46,238</span></div>
        <div class="cmd-metric"><span class="cmd-metric-label">Observed 24h</span><span class="cmd-metric-value" id="obs24h">11,847</span></div>
        <div class="cmd-metric"><span class="cmd-metric-label">UCTs</span><span class="cmd-metric-value" id="uctCount">14</span></div>
        <div class="cmd-divider"></div>
        <div class="cmd-weather">
            <span class="cmd-weather-val">F10.7</span><span class="cmd-weather-num">145</span>
            <span class="cmd-weather-val">Kp</span><span class="cmd-weather-num">1.67</span>
            <span class="cmd-weather-val">Dst</span><span class="cmd-weather-num">-30</span>
        </div>
        <div class="cmd-spacer"></div>
        <div class="cmd-alerts" id="alertBadge">⚠ 3 Alerts</div>
        <div class="cmd-divider"></div>
        <div class="cmd-metric"><span class="cmd-metric-label">UTC</span><span class="cmd-metric-value" id="utcClock">--:--:--</span></div>
    </header>

    <!-- ② 3D GLOBE -->
    <div class="globe-zone">
        <div class="globe-controls">
            <button class="globe-btn active" data-layer="leo">LEO</button>
            <button class="globe-btn active" data-layer="meo">MEO</button>
            <button class="globe-btn active" data-layer="geo">GEO</button>
            <button class="globe-btn" data-layer="conj">Conjunctions</button>
            <button class="globe-btn" data-layer="uct">UCTs</button>
            <button class="globe-btn" data-layer="sites">Sites</button>
            <button class="globe-btn" id="coverageToggle" data-layer="coverage">Coverage</button>
            <button class="globe-btn" id="debrisCloudToggle" data-layer="debris">Debris Clouds</button>
            <button class="globe-btn" id="geoViewBtn" style="border-color:#ffd740">GEO</button>
            <span style="flex:1"></span>
            <button class="globe-btn" id="fullCatalogToggle" style="background:rgba(118,255,3,0.1);border-color:#76ff03">Full Catalog</button>
            <button class="globe-btn" id="liveMapToggle" style="background:rgba(0,229,255,0.1);border-color:#00e5ff">Live Map ↗</button>
        </div>
        <!-- Time Scrubber -->
        <div class="time-scrubber" id="timeScrubber" style="position:absolute;bottom:140px;left:12px;right:340px;z-index:10;display:flex;align-items:center;gap:8px;padding:4px 10px;background:rgba(10,12,20,0.85);border-radius:8px;border:1px solid rgba(255,255,255,0.08);backdrop-filter:blur(8px)">
            <span style="font-size:9px;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.5px">T-</span>
            <input type="range" id="timeSlider" min="-72" max="24" value="0" step="1" style="flex:1;accent-color:#7c4dff;height:4px">
            <span id="timeLabel" style="font-family:'JetBrains Mono';font-size:11px;color:var(--text-primary);min-width:70px">NOW (T+0h)</span>
        </div>
        <div id="cesiumContainer"></div>
        <iframe id="liveMapFrame" src="" style="display:none;width:100%;height:100%;border:none;position:absolute;top:32px;left:0;right:0;bottom:0;z-index:5" allow="fullscreen"></iframe>
        <!-- Chat Overlay on Globe -->
        <div class="chat-overlay">
            <div class="chat-messages" id="chatMessages">
                <div class="chat-msg system">SentinelForge AI ready.</div>
            </div>
            <div class="chat-input-row">
                <input class="chat-input" id="chatInput" type="text" placeholder="Ask SentinelForge..." autocomplete="off">
                <button class="chat-send" id="chatSend">ASK</button>
            </div>
        </div>
    </div>

    <!-- ④ GAUGE PANEL -->
    <div class="gauge-panel" id="gaugePanel"></div>

    <!-- ③ GROUND NETWORK -->
    <div class="ground-zone">
        <div class="ground-map" id="groundMap">
            <div class="card-header">Ground Network</div>
            <canvas id="mapCanvas" style="width:100%;height:calc(100% - 33px);display:block;cursor:crosshair;"></canvas>
            <canvas id="mapOverlay" style="position:absolute;left:0;top:33px;width:100%;height:calc(100% - 33px);pointer-events:none;"></canvas>
            <div id="mapTooltip" class="map-tooltip" style="display:none;"></div>
        </div>
        <div class="ground-sites" id="groundSites"></div>
    </div>
    <!-- Site Detail Modal -->
    <div id="siteModal" class="site-modal" style="display:none;">
        <div class="site-modal-content">
            <div class="site-modal-header">
                <span id="siteModalTitle">Site Detail</span>
                <button id="siteModalClose" class="site-modal-close">✕</button>
            </div>
            <div id="siteModalBody" class="site-modal-body"></div>
        </div>
    </div>

    <!-- ⑤ CATALOG INVENTORY -->
    <div class="inventory-zone">
        <div class="inv-tabs">
            <div class="inv-tab active" data-tab="overview">Overview</div>
            <div class="inv-tab" data-tab="pcTimeline">Pc Timeline</div>
            <div class="inv-tab" data-tab="maneuver">Maneuver</div>
            <div class="inv-tab" data-tab="feeds">Feeds</div>
            <div class="inv-tab" data-tab="conj">Conjunctions</div>
            <div class="inv-tab" data-tab="uct">UCTs</div>
            <div class="inv-tab" data-tab="launches">Launches</div>
            <div class="inv-tab" data-tab="reentries">Reentries</div>
            <div class="inv-tab" data-tab="debris">Debris</div>
            <div class="inv-tab" data-tab="trending">Trending</div>
            <div class="inv-tab" data-tab="escalation">Escalation</div>
            <div class="inv-tab" data-tab="diagnostics">Diagnostics</div>
            <div class="inv-tab" data-tab="opsTempo">Ops Tempo</div>
        </div>
        <div class="inv-content" id="invContent"></div>
    </div>
</div>

<!-- Alert Toast Stack -->
<div class="alert-stack" id="alertStack"></div>

<script src="sentinel_core.js"></script>
<script src="sentinel_globe_chat.js"></script>
</body>
</html>
