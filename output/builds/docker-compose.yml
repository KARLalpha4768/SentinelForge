# SentinelForge Edge - Docker Compose
# Generated by Agent 13 (Docker Builder)
# Deploy: docker compose up -d

version: "3.8"

services:
  edge-pipeline:
    image: ecr.aws-govcloud.slingshot.internal/slingshot-edge:latest
    container_name: sentinelforge-edge
    runtime: nvidia
    restart: unless-stopped
    environment:
      - SITE_ID=${SITE_ID:-UNSET}
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - CLOUD_ENDPOINT=${CLOUD_ENDPOINT:-https://api.slingshot.internal}
      - VPN_TOKEN=${VPN_TOKEN}
    volumes:
      - /data/raw:/data/raw
      - /data/calibrated:/data/calibrated
      - /data/detections:/data/detections
      - /data/thumbnails:/data/thumbnails
      - /data/catalog:/data/catalog
      - /data/darks:/data/darks
      - /data/flats:/data/flats
      - ./config:/app/config:ro
      - ./logs:/logs
    ports:
      - "8080:8080"
    devices:
      - /dev/ttyUSB0:/dev/ttyUSB0    # Telescope mount serial
      - /dev/ttyUSB1:/dev/ttyUSB1    # Dome controller
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
        limits:
          memory: 48G
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    healthcheck:
      test: ["CMD", "python3", "/app/health_check.py"]
      interval: 60s
      timeout: 10s
      retries: 3

  watchdog:
    image: ecr.aws-govcloud.slingshot.internal/slingshot-monitor:latest
    container_name: sentinelforge-watchdog
    restart: always
    depends_on:
      - edge-pipeline
    environment:
      - WATCH_CONTAINER=sentinelforge-edge
      - ALERT_ENDPOINT=${ALERT_ENDPOINT}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./logs:/logs

  updater:
    image: ecr.aws-govcloud.slingshot.internal/slingshot-updater:latest
    container_name: sentinelforge-updater
    restart: always
    environment:
      - REGISTRY=ecr.aws-govcloud.slingshot.internal
      - IMAGE=slingshot-edge
      - CHECK_INTERVAL=3600
      - AUTO_ROLLBACK=true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
